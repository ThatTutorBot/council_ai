<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Council AI — embedded live demo (hosted app runs on Render)." />
    <title>Council AI — live demo</title>
    <style>
      :root {
        color-scheme: dark light;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        flex-direction: column;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      header {
        flex: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem 1.25rem;
        padding: 0.55rem 1rem;
        border-bottom: 1px solid rgba(127, 127, 127, 0.35);
        background: rgba(250, 250, 250, 0.92);
      }
      @media (prefers-color-scheme: dark) {
        header {
          background: rgba(22, 22, 24, 0.94);
          border-bottom-color: rgba(255, 255, 255, 0.12);
        }
      }
      header strong {
        font-size: 0.95rem;
        letter-spacing: -0.02em;
      }
      header nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.65rem 1rem;
        font-size: 0.85rem;
      }
      header a {
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }
      main {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      iframe {
        flex: 1;
        width: 100%;
        border: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Council AI</strong>
      <nav>
        <a href="https://council-ai.onrender.com/" target="_blank" rel="noopener noreferrer">Open on Render (new tab)</a>
        <span aria-hidden="true">·</span>
        <a href="https://github.com/ThatTutorBot/council_ai" target="_blank" rel="noopener noreferrer">Source &amp; docs</a>
      </nav>
    </header>
    <main>
      <iframe
        title="Council AI application"
        src="https://council-ai.onrender.com/"
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin"
        allow="clipboard-read; clipboard-write"
      ></iframe>
    </main>
  </body>
</html>
