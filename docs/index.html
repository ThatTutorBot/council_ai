<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Council AI — interactive embedded demo (full UI; hosted on Render)." />
    <title>Council AI — live demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070708;
        --bar: rgba(18, 18, 20, 0.92);
        --hairline: rgba(255, 255, 255, 0.08);
        --text: rgba(250, 250, 250, 0.92);
        --muted: rgba(250, 250, 250, 0.55);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        background-image:
          radial-gradient(ellipse 120% 80% at 50% -20%, rgba(120, 80, 200, 0.12), transparent 50%),
          radial-gradient(ellipse 80% 50% at 100% 50%, rgba(60, 100, 180, 0.08), transparent 45%);
        color: var(--text);
      }
      .page {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      header {
        flex: none;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem 1.25rem;
        padding: 0.65rem 1.25rem;
        border-bottom: 1px solid var(--hairline);
        background: var(--bar);
        backdrop-filter: blur(12px);
      }
      header strong {
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: -0.03em;
      }
      header nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.65rem 1rem;
        font-size: 0.82rem;
        color: var(--muted);
      }
      header a {
        color: var(--text);
        text-decoration: none;
        border-bottom: 1px solid rgba(250, 250, 250, 0.25);
      }
      header a:hover {
        border-bottom-color: rgba(250, 250, 250, 0.55);
      }
      .stage {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 1.25rem 1.75rem;
      }
      .frame {
        width: min(1220px, 100%);
        height: min(calc(100dvh - 5.5rem), 860px);
        border-radius: 14px;
        overflow: hidden;
        background: #111;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.06),
          0 32px 100px rgba(0, 0, 0, 0.65),
          0 12px 40px rgba(0, 0, 0, 0.35);
      }
      .frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #fff;
      }
      .hint {
        margin-top: 0.75rem;
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted);
        max-width: 42rem;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.45;
        padding: 0 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <strong>Council AI</strong>
        <nav>
          <span>Interactive demo</span>
          <span aria-hidden="true">·</span>
          <a
            href="https://council-ai.onrender.com/?embed=1"
            target="_blank"
            rel="noopener noreferrer"
            >Open full tab</a
          >
          <span aria-hidden="true">·</span>
          <a href="https://github.com/ThatTutorBot/council_ai" target="_blank" rel="noopener noreferrer">GitHub</a>
        </nav>
      </header>
      <div class="stage">
        <div class="frame" role="presentation">
          <iframe
            title="Council AI — live application"
            src="https://council-ai.onrender.com/?embed=1"
            loading="lazy"
            referrerpolicy="strict-origin-when-cross-origin"
            allow="clipboard-read; clipboard-write"
          ></iframe>
        </div>
      </div>
      <p class="hint">
        GitHub README cannot embed live pages; this site mirrors portfolio showcases like
        <a href="https://godly.website/" style="color: inherit" target="_blank" rel="noopener noreferrer">Godly</a
        >— full UI, same window. The app runs on Render; <code style="opacity: 0.85">?embed=1</code> opens the
        expanded UI for iframe embeds.
      </p>
    </div>
  </body>
</html>
